<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visites chez Papyves & Maguite</title>

    <style>
        :root {
            --primary: #d97706;
            --primary-dark: #b45309;
            --primary-light: #fef3c7;
            --bg-color: #fcfbf9;
            --text-color: #292524;
            --weekend-bg: #f5f5f4;
            --border-color: #e7e5e4;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --danger-bg: rgba(239, 68, 68, 0.18);
            --danger-light: #fee2e2;
            
            /* Style pour les aidants */
            --caregiver: #10b981;
            --caregiver-dark: #047857;
            --caregiver-light: #d1fae5;
            --caregiver-bg: rgba(16, 185, 129, 0.15);
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary);
            margin: 0 0 6px 0;
            font-size: 1.6rem;
        }

        p.subtitle {
            margin: 0;
            color: #78716c;
            font-size: 0.95rem;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .view-toggle {
            display: flex;
            gap: 8px;
        }

        .toggle-btn {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            color: #78716c;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            background: var(--bg-color);
            padding: 10px 14px;
            border-radius: 12px;
        }

        button {
            background: white;
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-color);
            transition: background 0.2s;
            font-size: 0.85rem;
        }

        button:hover {
            background: var(--border-color);
        }

        button.primary-btn {
            background: var(--primary);
            color: white;
            border: none;
        }

        button.primary-btn:hover {
            background: var(--primary-dark);
        }

        button.danger-btn {
            background: var(--danger);
            color: white;
            border: none;
        }

        button.danger-btn:hover {
            background: var(--danger-dark);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 16px;
        }

        .day-header {
            text-align: center;
            font-weight: bold;
            font-size: 0.8rem;
            color: #78716c;
            padding: 4px 0;
        }

        .calendar-day {
            min-height: 85px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 4px;
            background: white;
            display: flex;
            flex-direction: column;
            gap: 3px;
            overflow: hidden;
            transition: background-color 0.2s ease;
        }

        .calendar-day.weekend {
            background-color: var(--weekend-bg);
        }

        .calendar-day.has-absence {
            background-color: var(--danger-bg) !important;
            border-color: #fca5a5;
        }

        .calendar-day.other-month {
            opacity: 0.3;
        }

        .day-number {
            font-weight: bold;
            font-size: 0.8rem;
        }

        .visit-tag {
            background: var(--primary-light);
            color: #92400e;
            font-size: 0.75rem;
            padding: 3px 5px;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-left: 3px solid var(--primary);
            cursor: pointer;
            display: block;
        }

        .absence-text {
            color: var(--danger-dark);
            font-size: 0.75rem;
            padding: 2px 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            display: block;
            font-weight: 600;
        }

        .caregiver-tag {
            background: var(--caregiver-light);
            color: var(--caregiver-dark);
            font-size: 0.75rem;
            padding: 3px 5px;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-left: 3px solid var(--caregiver);
            cursor: pointer;
            display: block;
            font-weight: 600;
        }

        .dots-container {
            display: none;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 2px;
            justify-content: center;
        }

        .visit-dot-bullet {
            width: 10px;
            height: 10px;
            background-color: var(--primary);
            border-radius: 50%;
            cursor: pointer;
        }

        .absence-dot-bullet {
            width: 10px;
            height: 10px;
            background-color: var(--danger);
            border-radius: 50%;
            cursor: pointer;
        }

        .caregiver-dot-bullet {
            width: 10px;
            height: 10px;
            background-color: var(--caregiver);
            border-radius: 50%;
            cursor: pointer;
        }

        .timeline-item {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
            justify-content: space-between;
        }

        .timeline-date {
            width: 180px;
            font-weight: bold;
            color: #78716c;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .timeline-content {
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .timeline-badge {
            background: var(--primary-light);
            color: #92400e;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            cursor: pointer;
            border-left: 3px solid var(--primary);
        }

        .timeline-badge.absence {
            background: var(--danger-light);
            color: var(--danger-dark);
            border-left: 3px solid var(--danger);
        }

        .timeline-badge.caregiver {
            background: var(--caregiver-light);
            color: var(--caregiver-dark);
            border-left: 3px solid var(--caregiver);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-header h3 {
            margin: 0;
            color: var(--primary);
            font-size: 1.2rem;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #78716c;
            padding: 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        input[type="text"], input[type="date"], input[type="number"], select {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .day-meals-block {
            background-color: var(--bg-color);
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
        }

        .day-meals-title {
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--primary-dark);
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 4px;
        }

        .meal-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .meal-row:last-child {
            margin-bottom: 0;
        }

        .meal-checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            user-select: none;
        }

        .meal-select {
            padding: 4px 6px;
            font-size: 0.8rem;
        }

        .recap-item {
            margin-bottom: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .recap-label {
            font-weight: bold;
            color: #78716c;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .recap-value {
            color: var(--text-color);
            font-weight: 500;
        }

        .recap-badge-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 4px;
        }

        .recap-badge-item {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            display: inline-block;
        }

        .modal-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .modal-actions-right {
            display: flex;
            gap: 8px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            body { padding: 6px; }
            .container { padding: 12px; border-radius: 12px; }
            h1 { font-size: 1.3rem; }
            .top-bar { flex-direction: column; align-items: stretch; }
            .view-toggle { justify-content: center; }
            .top-bar .primary-btn { width: 100%; text-align: center; }
            .calendar-day { min-height: 55px; padding: 3px; }
            .day-number { font-size: 0.75rem; text-align: center; }
            
            .visit-tag, .absence-text, .caregiver-tag { display: none; }
            .dots-container { display: flex; }
            
            .timeline-item { flex-direction: column; align-items: flex-start; gap: 6px; }
            .timeline-date { width: auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Visites chez Papyves & Maguite 🏡</h1>
            <p class="subtitle">Le calendrier de la famille, simple et chaleureux</p>
        </header>

        <div class="top-bar">
            <div class="view-toggle">
                <button id="btn-view-grid" class="toggle-btn active">📅 Grille Mois</button>
                <button id="btn-view-list" class="toggle-btn">📋 Vue Déroulante</button>
            </div>
            <button id="btn-open-add-modal" class="primary-btn">➕ Ajouter un événement</button>
        </div>

        <div class="calendar-nav" id="calendar-nav-bar">
            <button id="btn-prev-month">‹ Précédent</button>
            <div style="text-align: center;">
                <h2 id="current-month-label" style="margin: 0; font-size: 1rem;"></h2>
                <button id="btn-go-today" style="font-size: 0.7rem; margin-top: 2px; padding: 2px 6px;">Aujourd'hui</button>
            </div>
            <button id="btn-next-month">Suivant ›</button>
        </div>

        <div id="grid-view-container">
            <div class="calendar-grid">
                <div class="day-header">Lun</div>
                <div class="day-header">Mar</div>
                <div class="day-header">Mer</div>
                <div class="day-header">Jeu</div>
                <div class="day-header">Ven</div>
                <div class="day-header" style="color:var(--primary);">Sam</div>
                <div class="day-header" style="color:var(--primary);">Dim</div>
            </div>
            <div class="calendar-grid" id="calendar-days"></div>
        </div>

        <div id="list-view-container" class="timeline-view hidden">
            <div id="timeline-container"></div>
        </div>
    </div>

    <!-- Modale -->
    <div id="visit-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modal-title">➕ Ajouter un événement</h3>
                <button id="btn-close-modal" class="close-modal">✕</button>
            </div>
            
            <input type="hidden" id="visit-id">

            <!-- VUE RÉCAPITULATIF -->
            <div id="modal-recap-content" class="hidden">
                <div class="recap-item">
                    <div class="recap-label" id="recap-type-label">Événement</div>
                    <div id="recap-name" class="recap-value" style="font-size: 1.1rem; font-weight: bold;"></div>
                </div>

                <div class="recap-item">
                    <div class="recap-label">Jour sélectionné</div>
                    <div id="recap-dates" class="recap-value"></div>
                </div>

                <div id="recap-caregiver-info" class="recap-item hidden">
                    <div class="recap-label">Créneau de passage</div>
                    <div id="recap-caregiver-slot" class="recap-value"></div>
                </div>

                <div id="recap-meals-group" class="recap-item">
                    <div class="recap-label">Repas du jour</div>
                    <div id="recap-meals" class="recap-badge-list"></div>
                </div>

                <div id="recap-comment-group" class="recap-item">
                    <div class="recap-label">Commentaire de la visite</div>
                    <div id="recap-comment" class="recap-value" style="font-style: italic;"></div>
                </div>
            </div>

            <!-- VUE FORMULAIRE -->
            <div id="modal-form-content">
                <div class="form-group">
                    <label for="event-type">Type d'événement</label>
                    <select id="event-type">
                        <option value="visit">Visite chez Papyves et Maguite</option>
                        <option value="caregiver">🧑‍⚕️ Passage d'aidants</option>
                        <option value="absence">🚫 Absence de Papyves et Maguite</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="visitor-name" id="label-visitor-name">Nom / Prénom</label>
                    <input type="text" id="visitor-name" placeholder="Ex: Thomas & Julie">
                </div>
                
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 2;">
                        <label for="visit-start">Date de début</label>
                        <input type="date" id="visit-start">
                    </div>
                    <div class="form-group" style="flex: 1;" id="days-count-container">
                        <label for="visit-days">Jours</label>
                        <input type="number" id="visit-days" value="1" min="1" max="30">
                    </div>
                </div>

                <!-- Champs spécifiques aux Aidants -->
                <div id="caregiver-fields" class="hidden">
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 1;">
                            <label for="caregiver-slot">Créneau de la journée</label>
                            <select id="caregiver-slot">
                                <option value="morning">🌅 Matin</option>
                                <option value="afternoon">☀️ Après-midi</option>
                                <option value="evening">🌙 Soirée</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="caregiver-time">Heure précise (facultatif)</label>
                            <input type="text" id="caregiver-time" placeholder="Ex: 08h30 - 09h00">
                        </div>
                    </div>

                    <div style="display: flex; gap: 10px; margin-top: 4px;">
                        <div class="form-group" style="flex: 1;">
                            <label for="caregiver-repeat">Passage régulier ?</label>
                            <select id="caregiver-repeat">
                                <option value="none">Non (Ponctuel)</option>
                                <option value="daily">Tous les jours</option>
                                <option value="weekly">Toutes les semaines</option>
                                <option value="monthly">Tous les mois</option>
                            </select>
                        </div>
                        <div class="form-group hidden" style="flex: 1;" id="repeat-until-group">
                            <label for="caregiver-until">Jusqu'au</label>
                            <input type="date" id="caregiver-until">
                        </div>
                    </div>
                </div>

                <!-- Section dynamique pour les repas jour par jour (visites uniquement) -->
                <div id="meals-section-container"></div>

                <div class="form-group" id="comment-section-container">
                    <label for="visit-comment">Commentaire (facultatif)</label>
                    <input type="text" id="visit-comment" placeholder="Ex: On arrive pour le goûter !">
                </div>
            </div>

            <div class="modal-actions">
                <div>
                    <button id="btn-delete-visit" class="danger-btn hidden">🗑️ Supprimer</button>
                </div>
                <div class="modal-actions-right">
                    <button id="btn-cancel-modal">Annuler</button>
                    <button id="btn-edit-mode" class="primary-btn hidden">✏️ Modifier</button>
                    <button id="btn-save-visit" class="primary-btn">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDk4ZaEveUEdbpI1zOM64MShbtLmsL_3eU",
            authDomain: "famille-papyves.firebaseapp.com",
            projectId: "famille-papyves",
            storageBucket: "famille-papyves.firebasestorage.app",
            messagingSenderId: "159741543345",
            appId: "1:159741543345:web:4f5dcf0deb6c11ef47b390"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentDate = new Date();
        let currentView = 'grid';
        let visits = [];

        const monthNames = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];

        function parseLocalDate(dateStr) {
            if(!dateStr) return new Date();
            const [year, month, day] = dateStr.split('-').map(Number);
            return new Date(year, month - 1, day);
        }

        function formatDateToISO(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function checkPasscode() {
            const code = prompt("Entrez le code secret :");
            if (!code || code.trim().toUpperCase() !== "DENIS") {
                alert("Code incorrect. Action annulée.");
                return false;
            }
            return true;
        }

        // Détermine l'ordre d'arrivée chrono d'un événement pour un jour donné
        function getMealOrderScore(visit, dateISO) {
            if (visit.type === "absence") return 99; // Absences en dernier

            if (visit.type === "caregiver") {
                if (visit.timeSlot === "morning") return 0.5;   // Avant/pendant le petit déj
                if (visit.timeSlot === "afternoon") return 2.5; // Entre déjeuner et dîner
                if (visit.timeSlot === "evening") return 3.5;   // En soirée
                return 1.5;
            }

            if (!visit.dailyMeals || !visit.dailyMeals[dateISO]) return 50; // Visite simple sans détails

            const dayMeals = visit.dailyMeals[dateISO];
            if (dayMeals.breakfast?.active) return 1; // Présent au petit déjeuner
            if (dayMeals.lunch?.active) return 2;     // Présent au déjeuner
            if (dayMeals.dinner?.active) return 3;    // Présent au dîner

            return 4; 
        }

        document.getElementById("visit-start").addEventListener("change", generateMealsForm);
        document.getElementById("visit-days").addEventListener("input", generateMealsForm);

        const eventTypeSelect = document.getElementById("event-type");
        eventTypeSelect.addEventListener("change", () => {
            toggleFormFields(eventTypeSelect.value);
        });

        document.getElementById("caregiver-repeat").addEventListener("change", (e) => {
            const repeatUntil = document.getElementById("repeat-until-group");
            if (e.target.value !== "none") {
                repeatUntil.classList.remove("hidden");
            } else {
                repeatUntil.classList.add("hidden");
            }
        });

        function toggleFormFields(type) {
            const labelName = document.getElementById("label-visitor-name");
            const inputName = document.getElementById("visitor-name");
            const mealsContainer = document.getElementById("meals-section-container");
            const commentContainer = document.getElementById("comment-section-container");
            const caregiverFields = document.getElementById("caregiver-fields");
            const daysContainer = document.getElementById("days-count-container");

            if (type === "absence") {
                labelName.innerText = "Motif de l'absence";
                inputName.placeholder = "Ex: Vacances à la mer";
                mealsContainer.classList.add("hidden");
                commentContainer.classList.add("hidden");
                caregiverFields.classList.add("hidden");
                daysContainer.classList.remove("hidden");
            } else if (type === "caregiver") {
                labelName.innerText = "Intervenant / Service";
                inputName.placeholder = "Ex: Passage Infirmière / Kiné / Menage";
                mealsContainer.classList.add("hidden");
                commentContainer.classList.remove("hidden");
                caregiverFields.classList.remove("hidden");
                daysContainer.classList.add("hidden"); 
            } else { // Visite
                labelName.innerText = "Nom / Prénom";
                inputName.placeholder = "Ex: Thomas & Julie";
                mealsContainer.classList.remove("hidden");
                commentContainer.classList.remove("hidden");
                caregiverFields.classList.add("hidden");
                daysContainer.classList.remove("hidden");
                generateMealsForm();
            }
        }

        function generateMealsForm(existingDailyMeals = null) {
            const mealsContainer = document.getElementById("meals-section-container");
            if (eventTypeSelect.value !== "visit") return;

            const startStr = document.getElementById("visit-start").value;
            const daysCount = parseInt(document.getElementById("visit-days").value) || 1;

            mealsContainer.innerHTML = "";

            if (!startStr) {
                mealsContainer.innerHTML = "<p style='font-size:0.8rem; color:#78716c; font-style:italic;'>Sélectionnez une date de début pour configurer les repas.</p>";
                return;
            }

            const startDate = parseLocalDate(startStr);

            for (let i = 0; i < daysCount; i++) {
                const currentDay = new Date(startDate);
                currentDay.setDate(startDate.getDate() + i);
                const dayISO = formatDateToISO(currentDay);

                const dateDisplay = currentDay.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });

                const dayBlock = document.createElement("div");
                dayBlock.className = "day-meals-block";

                const title = document.createElement("div");
                title.className = "day-meals-title";
                title.innerText = `🍽️ Repas du ${dateDisplay}`;
                dayBlock.appendChild(title);

                const dayData = (existingDailyMeals && existingDailyMeals[dayISO]) ? existingDailyMeals[dayISO] : null;

                ['breakfast', 'lunch', 'dinner'].forEach(mealKey => {
                    const mealLabels = { breakfast: '🥐 Petit-déjeuner', lunch: '🥗 Déjeuner', dinner: '🍲 Dîner' };
                    
                    const row = document.createElement("div");
                    row.className = "meal-row";

                    const isChecked = dayData && dayData[mealKey] && dayData[mealKey].active;
                    const countVal = (dayData && dayData[mealKey] && dayData[mealKey].count) ? dayData[mealKey].count : 1;

                    row.innerHTML = `
                        <label class="meal-checkbox-label">
                            <input type="checkbox" id="chk-${dayISO}-${mealKey}" ${isChecked ? 'checked' : ''}> ${mealLabels[mealKey]}
                        </label>
                        <select id="sel-${dayISO}-${mealKey}" class="meal-select" ${!isChecked ? 'disabled' : ''}>
                            ${[...Array(10).keys()].map(n => `<option value="${n+1}" ${countVal === n+1 ? 'selected' : ''}>${n+1} pers.</option>`).join('')}
                        </select>
                    `;

                    dayBlock.appendChild(row);
                });

                mealsContainer.appendChild(dayBlock);

                ['breakfast', 'lunch', 'dinner'].forEach(mealKey => {
                    const chk = dayBlock.querySelector(`#chk-${dayISO}-${mealKey}`);
                    const sel = dayBlock.querySelector(`#sel-${dayISO}-${mealKey}`);
                    chk.addEventListener('change', () => {
                        sel.disabled = !chk.checked;
                    });
                });
            }
        }

        onSnapshot(collection(db, "visits"), (snapshot) => {
            visits = [];
            snapshot.forEach((docSnapshot) => {
                visits.push({ id: docSnapshot.id, ...docSnapshot.data() });
            });
            renderCalendar();
        });

        function openModalForAdd() {
            document.getElementById("modal-title").innerText = "➕ Ajouter un événement";
            document.getElementById("visit-id").value = "";
            document.getElementById("event-type").value = "visit";
            toggleFormFields("visit");

            document.getElementById("visitor-name").value = "";
            
            const todayStr = formatDateToISO(new Date());
            document.getElementById("visit-start").value = todayStr;
            document.getElementById("visit-days").value = "1";
            document.getElementById("visit-comment").value = "";
            document.getElementById("caregiver-slot").value = "morning";
            document.getElementById("caregiver-time").value = "";
            document.getElementById("caregiver-repeat").value = "none";
            document.getElementById("repeat-until-group").classList.add("hidden");

            generateMealsForm();

            document.getElementById("modal-recap-content").classList.add("hidden");
            document.getElementById("modal-form-content").classList.remove("hidden");

            document.getElementById("btn-delete-visit").classList.add("hidden");
            document.getElementById("btn-edit-mode").classList.add("hidden");
            document.getElementById("btn-save-visit").classList.remove("hidden");

            document.getElementById("visit-modal").classList.add("active");
        }

        function openModalForView(id, targetDayISO = null) {
            const visit = visits.find(v => v.id === id);
            if (!visit) return;

            const isAbsence = visit.type === "absence";
            const isCaregiver = visit.type === "caregiver";

            document.getElementById("modal-title").innerText = isAbsence ? "🚫 Détails de l'absence" : (isCaregiver ? "🧑‍⚕️ Passage d'aidant" : "📋 Détails de la visite");
            document.getElementById("visit-id").value = visit.id;

            let typeLabel = "Visiteur(s)";
            if (isAbsence) typeLabel = "Absence de Papyves et Maguite";
            if (isCaregiver) typeLabel = "Intervenant / Aidant";

            document.getElementById("recap-type-label").innerText = typeLabel;
            
            const recapName = document.getElementById("recap-name");
            recapName.innerText = visit.name;
            
            if (isAbsence) recapName.style.color = "var(--danger)";
            else if (isCaregiver) recapName.style.color = "var(--caregiver-dark)";
            else recapName.style.color = "var(--primary-dark)";

            const startDate = parseLocalDate(visit.start);
            const endDate = new Date(startDate);
            endDate.setDate(startDate.getDate() + ((visit.days || 1) - 1));

            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            const activeDateISO = targetDayISO || visit.start;
            const activeDate = parseLocalDate(activeDateISO);

            if (visit.days > 1) {
                document.getElementById("recap-dates").innerText = `${activeDate.toLocaleDateString('fr-FR', options)} (Du ${startDate.toLocaleDateString('fr-FR')} au ${endDate.toLocaleDateString('fr-FR')})`;
            } else {
                document.getElementById("recap-dates").innerText = activeDate.toLocaleDateString('fr-FR', options);
            }

            const mealsGroup = document.getElementById("recap-meals-group");
            const commentGroup = document.getElementById("recap-comment-group");
            const caregiverGroup = document.getElementById("recap-caregiver-info");

            if (isAbsence) {
                mealsGroup.classList.add("hidden");
                commentGroup.classList.add("hidden");
                caregiverGroup.classList.add("hidden");
            } else if (isCaregiver) {
                mealsGroup.classList.add("hidden");
                commentGroup.classList.remove("hidden");
                caregiverGroup.classList.remove("hidden");

                const slotLabels = { morning: '🌅 Matin', afternoon: '☀️ Après-midi', evening: '🌙 Soirée' };
                let slotText = slotLabels[visit.timeSlot] || 'Créneau non précisé';
                if (visit.exactTime) {
                    slotText += ` (${visit.exactTime})`;
                }
                document.getElementById("recap-caregiver-slot").innerText = slotText;
                document.getElementById("recap-comment").innerText = visit.comment ? `« ${visit.comment} »` : "Aucun commentaire.";
            } else { // Visite
                mealsGroup.classList.remove("hidden");
                commentGroup.classList.remove("hidden");
                caregiverGroup.classList.add("hidden");

                const mealsList = document.getElementById("recap-meals");
                mealsList.innerHTML = "";
                let hasMeals = false;

                const dayMealData = (visit.dailyMeals && visit.dailyMeals[activeDateISO]) ? visit.dailyMeals[activeDateISO] : null;

                if (dayMealData) {
                    if (dayMealData.breakfast?.active) {
                        mealsList.innerHTML += `<div class="recap-badge-item">🥐 Petit-déjeuner (${dayMealData.breakfast.count} pers.)</div>`;
                        hasMeals = true;
                    }
                    if (dayMealData.lunch?.active) {
                        mealsList.innerHTML += `<div class="recap-badge-item">🥗 Déjeuner (${dayMealData.lunch.count} pers.)</div>`;
                        hasMeals = true;
                    }
                    if (dayMealData.dinner?.active) {
                        mealsList.innerHTML += `<div class="recap-badge-item">🍲 Dîner (${dayMealData.dinner.count} pers.)</div>`;
                        hasMeals = true;
                    }
                }
                
                if (!hasMeals) {
                    mealsList.innerHTML = `<span style="color:#78716c; font-style:italic;">Aucun repas prévu ce jour-là</span>`;
                }

                document.getElementById("recap-comment").innerText = visit.comment ? `« ${visit.comment} »` : "Aucun commentaire.";
            }

            document.getElementById("modal-recap-content").classList.remove("hidden");
            document.getElementById("modal-form-content").classList.add("hidden");

            document.getElementById("btn-delete-visit").classList.add("hidden");
            document.getElementById("btn-save-visit").classList.add("hidden");
            document.getElementById("btn-edit-mode").classList.remove("hidden");

            document.getElementById("visit-modal").classList.add("active");
        }

        function switchToEditMode() {
            if (!checkPasscode()) return;

            const id = document.getElementById("visit-id").value;
            const visit = visits.find(v => v.id === id);
            if (!visit) return;

            const type = visit.type || "visit";
            document.getElementById("modal-title").innerText = type === "absence" ? "✏️ Modifier l'absence" : (type === "caregiver" ? "✏️ Modifier l'aidant" : "✏️ Modifier la visite");
            document.getElementById("event-type").value = type;
            toggleFormFields(type);

            document.getElementById("visitor-name").value = visit.name;
            document.getElementById("visit-start").value = visit.start;
            document.getElementById("visit-days").value = visit.days || 1;
            document.getElementById("visit-comment").value = visit.comment || "";

            if (type === "caregiver") {
                document.getElementById("caregiver-slot").value = visit.timeSlot || "morning";
                document.getElementById("caregiver-time").value = visit.exactTime || "";
                document.getElementById("caregiver-repeat").value = "none";
                document.getElementById("repeat-until-group").classList.add("hidden");
            } else if (type === "visit") {
                generateMealsForm(visit.dailyMeals);
            }

            document.getElementById("modal-recap-content").classList.add("hidden");
            document.getElementById("modal-form-content").classList.remove("hidden");

            document.getElementById("btn-delete-visit").classList.remove("hidden");
            document.getElementById("btn-edit-mode").classList.add("hidden");
            document.getElementById("btn-save-visit").classList.remove("hidden");
        }

        function closeModal() {
            document.getElementById("visit-modal").classList.remove("active");
        }

        function setView(view) {
            currentView = view;
            const gridContainer = document.getElementById("grid-view-container");
            const listContainer = document.getElementById("list-view-container");
            const navBar = document.getElementById("calendar-nav-bar");
            const btnGrid = document.getElementById("btn-view-grid");
            const btnList = document.getElementById("btn-view-list");

            if (view === 'grid') {
                gridContainer.classList.remove("hidden");
                listContainer.classList.add("hidden");
                navBar.classList.remove("hidden");
                btnGrid.classList.add("active");
                btnList.classList.remove("active");
            } else {
                gridContainer.classList.add("hidden");
                listContainer.classList.remove("hidden");
                navBar.classList.add("hidden");
                btnGrid.classList.remove("active");
                btnList.classList.add("active");
            }
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            document.getElementById("current-month-label").innerText = `${monthNames[month]} ${year}`;

            // --- 1. RENDU DE LA GRILLE ---
            const daysContainer = document.getElementById("calendar-days");
            daysContainer.innerHTML = "";

            const firstDayIndex = (new Date(year, month, 1).getDay() + 6) % 7; 
            const totalDays = new Date(year, month + 1, 0).getDate();
            const prevTotalDays = new Date(year, month, 0).getDate();

            for (let i = firstDayIndex; i > 0; i--) {
                const dayDiv = document.createElement("div");
                dayDiv.className = "calendar-day other-month";
                dayDiv.innerHTML = `<div class="day-number">${prevTotalDays - i + 1}</div>`;
                daysContainer.appendChild(dayDiv);
            }

            for (let day = 1; day <= totalDays; day++) {
                const dayDiv = document.createElement("div");
                const currentDay = new Date(year, month, day);
                const currentDayISO = formatDateToISO(currentDay);
                const isWeekend = currentDay.getDay() === 0 || currentDay.getDay() === 6;

                let dayVisits = [];
                let hasAbsence = false;

                visits.forEach(v => {
                    let startDate = parseLocalDate(v.start);
                    let endDate = new Date(startDate);
                    endDate.setDate(startDate.getDate() + ((v.days || 1) - 1));

                    if (currentDay >= startDate && currentDay <= endDate) {
                        dayVisits.push(v);
                        if (v.type === "absence") {
                            hasAbsence = true;
                        }
                    }
                });

                // Tri par ordre chrono des repas/créneaux
                dayVisits.sort((a, b) => {
                    return getMealOrderScore(a, currentDayISO) - getMealOrderScore(b, currentDayISO);
                });

                dayDiv.className = `calendar-day ${isWeekend ? 'weekend' : ''} ${hasAbsence ? 'has-absence' : ''}`;
                dayDiv.innerHTML = `<div class="day-number">${day}</div>`;

                const dotsContainer = document.createElement("div");
                dotsContainer.className = "dots-container";

                dayVisits.forEach(v => {
                    const isAbsence = v.type === "absence";
                    const isCaregiver = v.type === "caregiver";

                    const tag = document.createElement("div");
                    if (isAbsence) {
                        tag.className = "absence-text";
                        tag.title = v.name;
                        tag.innerText = `🚫 ${v.name}`;
                    } else if (isCaregiver) {
                        tag.className = "caregiver-tag";
                        const slotIcons = { morning: '🌅', afternoon: '☀️', evening: '🌙' };
                        const icon = slotIcons[v.timeSlot] || '🧑‍⚕️';
                        tag.title = `${v.name} (${v.exactTime || v.timeSlot})`;
                        tag.innerText = `${icon} ${v.name}`;
                    } else {
                        tag.className = "visit-tag";
                        tag.title = `${v.name}${v.comment ? ' - ' + v.comment : ''}`;
                        tag.innerText = v.name;
                    }
                    tag.onclick = (e) => { e.stopPropagation(); openModalForView(v.id, currentDayISO); };
                    dayDiv.appendChild(tag);

                    const dot = document.createElement("div");
                    if (isAbsence) dot.className = "absence-dot-bullet";
                    else if (isCaregiver) dot.className = "caregiver-dot-bullet";
                    else dot.className = "visit-dot-bullet";
                    
                    dot.title = `${v.name} (Cliquer pour détails)`;
                    dot.onclick = (e) => { e.stopPropagation(); openModalForView(v.id, currentDayISO); };
                    dotsContainer.appendChild(dot);
                });

                dayDiv.appendChild(dotsContainer);
                daysContainer.appendChild(dayDiv);
            }

            // --- 2. RENDU DE LA VUE DÉROULANTE ---
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const upcomingVisits = visits.filter(v => {
                const startDate = parseLocalDate(v.start);
                const endDate = new Date(startDate);
                endDate.setDate(startDate.getDate() + ((v.days || 1) - 1));
                return endDate >= today;
            });

            upcomingVisits.sort((a, b) => parseLocalDate(a.start) - parseLocalDate(b.start));

            let timelineHtml = "";

            if (upcomingVisits.length === 0) {
                timelineHtml = "<p style='color:#78716c; font-style:italic; text-align:center; padding: 20px 0;'>Aucun événement à venir.</p>";
            } else {
                upcomingVisits.forEach(v => {
                    const isAbsence = v.type === "absence";
                    const isCaregiver = v.type === "caregiver";
                    const startDate = parseLocalDate(v.start);
                    const endDate = new Date(startDate);
                    endDate.setDate(startDate.getDate() + ((v.days || 1) - 1));

                    const optionsDate = { day: 'numeric', month: 'short' };
                    let dateText = "";
                    if ((v.days || 1) === 1) {
                        dateText = startDate.toLocaleDateString('fr-FR', optionsDate);
                    } else {
                        dateText = `${startDate.toLocaleDateString('fr-FR', optionsDate)} - ${endDate.toLocaleDateString('fr-FR', optionsDate)}`;
                    }

                    let badgeClass = "";
                    let labelText = v.name;
                    if (isAbsence) {
                        badgeClass = "absence";
                        labelText = `Absence: ${v.name}`;
                    } else if (isCaregiver) {
                        badgeClass = "caregiver";
                        labelText = `🧑‍⚕️ ${v.name} ${v.exactTime ? '('+v.exactTime+')' : ''}`;
                    } else {
                        if (v.comment) labelText += ` (${v.comment})`;
                    }

                    timelineHtml += `
                        <div class="timeline-item">
                            <div class="timeline-date">🗓️ ${dateText}</div>
                            <div class="timeline-content">
                                <span class="timeline-badge ${badgeClass}" data-id="${v.id}">
                                    <strong>${labelText}</strong>
                                </span>
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById("timeline-container").innerHTML = timelineHtml;
            
            document.querySelectorAll('.timeline-badge').forEach(badge => {
                badge.addEventListener('click', () => openModalForView(badge.dataset.id));
            });
        }

        async function saveOrDeleteVisit(isDelete = false) {
            const id = document.getElementById("visit-id").value;

            if (isDelete) {
                if (confirm("Voulez-vous vraiment supprimer cet événement ?")) {
                    await deleteDoc(doc(db, "visits", id));
                    closeModal();
                }
                return;
            }

            const type = document.getElementById("event-type").value;
            const name = document.getElementById("visitor-name").value.trim();
            const start = document.getElementById("visit-start").value;
            let days = parseInt(document.getElementById("visit-days").value) || 1;

            if (!name || !start) {
                alert("Veuillez remplir le nom/intitulé et la date de début.");
                return;
            }

            if (!id) {
                if (!checkPasscode()) return;
            }

            // Gestion spécifique des Aidants (et répétitions)
            if (type === "caregiver") {
                const timeSlot = document.getElementById("caregiver-slot").value;
                const exactTime = document.getElementById("caregiver-time").value.trim();
                const repeat = document.getElementById("caregiver-repeat").value;
                const comment = document.getElementById("visit-comment").value.trim();

                if (repeat !== "none" && !id) { // Création d'événements récurrents
                    let untilStr = document.getElementById("caregiver-until").value;
                    let startDate = parseLocalDate(start);
                    let untilDate = untilStr ? parseLocalDate(untilStr) : new Date(startDate);

                    if (!untilStr) {
                        // Par défaut répétition sur 3 mois
                        untilDate.setMonth(untilDate.getMonth() + 3);
                    }

                    let datesToAdd = [];
                    let curr = new Date(startDate);

                    while (curr <= untilDate) {
                        datesToAdd.push(formatDateToISO(curr));

                        if (repeat === "daily") {
                            curr.setDate(curr.getDate() + 1);
                        } else if (repeat === "weekly") {
                            curr.setDate(curr.getDate() + 7);
                        } else if (repeat === "monthly") {
                            curr.setMonth(curr.getMonth() + 1);
                        }
                    }

                    for (let dateISO of datesToAdd) {
                        await addDoc(collection(db, "visits"), {
                            type: "caregiver",
                            name,
                            start: dateISO,
                            days: 1,
                            timeSlot,
                            exactTime,
                            comment
                        });
                    }
                    closeModal();
                    return;
                } else {
                    let caregiverData = {
                        type,
                        name,
                        start,
                        days: 1,
                        timeSlot,
                        exactTime,
                        comment
                    };

                    if (id) {
                        await updateDoc(doc(db, "visits", id), caregiverData);
                    } else {
                        await addDoc(collection(db, "visits"), caregiverData);
                    }
                    closeModal();
                    return;
                }
            }

            let visitData = { type, name, start, days };

            if (type === "visit") {
                const comment = document.getElementById("visit-comment").value.trim();
                const dailyMeals = {};

                const startDate = parseLocalDate(start);

                for (let i = 0; i < days; i++) {
                    const currentDay = new Date(startDate);
                    currentDay.setDate(startDate.getDate() + i);
                    const dayISO = formatDateToISO(currentDay);

                    dailyMeals[dayISO] = {
                        breakfast: {
                            active: document.getElementById(`chk-${dayISO}-breakfast`)?.checked || false,
                            count: parseInt(document.getElementById(`sel-${dayISO}-breakfast`)?.value || 1)
                        },
                        lunch: {
                            active: document.getElementById(`chk-${dayISO}-lunch`)?.checked || false,
                            count: parseInt(document.getElementById(`sel-${dayISO}-lunch`)?.value || 1)
                        },
                        dinner: {
                            active: document.getElementById(`chk-${dayISO}-dinner`)?.checked || false,
                            count: parseInt(document.getElementById(`sel-${dayISO}-dinner`)?.value || 1)
                        }
                    };
                }

                visitData.comment = comment;
                visitData.dailyMeals = dailyMeals;
            }

            if (id) {
                await updateDoc(doc(db, "visits", id), visitData);
            } else {
                await addDoc(collection(db, "visits"), visitData);
            }

            closeModal();
        }

        document.getElementById("btn-view-grid").onclick = () => setView('grid');
        document.getElementById("btn-view-list").onclick = () => setView('list');
        document.getElementById("btn-open-add-modal").onclick = openModalForAdd;
        document.getElementById("btn-close-modal").onclick = closeModal;
        document.getElementById("btn-cancel-modal").onclick = closeModal;
        document.getElementById("btn-edit-mode").onclick = switchToEditMode;
        document.getElementById("btn-save-visit").onclick = () => saveOrDeleteVisit(false);
        document.getElementById("btn-delete-visit").onclick = () => saveOrDeleteVisit(true);

        document.getElementById("btn-prev-month").onclick = () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        };

        document.getElementById("btn-next-month").onclick = () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        };

        document.getElementById("btn-go-today").onclick = () => {
            currentDate = new Date();
            renderCalendar();
        };

        renderCalendar();
    </script>
