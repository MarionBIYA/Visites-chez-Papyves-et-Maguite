<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visites chez Papyves & Maguite</title>

    <style>
        :root {
            --primary: #d97706;
            --primary-dark: #b45309;
            --primary-light: #fef3c7;
            --bg-color: #fcfbf9;
            --text-color: #292524;
            --weekend-bg: #f5f5f4;
            --border-color: #e7e5e4;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --danger-light: #fee2e2;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary);
            margin: 0 0 6px 0;
            font-size: 1.6rem;
        }

        p.subtitle {
            margin: 0;
            color: #78716c;
            font-size: 0.95rem;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .view-toggle {
            display: flex;
            gap: 8px;
        }

        .toggle-btn {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            color: #78716c;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            background: var(--bg-color);
            padding: 10px 14px;
            border-radius: 12px;
        }

        button {
            background: white;
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-color);
            transition: background 0.2s;
            font-size: 0.85rem;
        }

        button:hover {
            background: var(--border-color);
        }

        button.primary-btn {
            background: var(--primary);
            color: white;
            border: none;
        }

        button.primary-btn:hover {
            background: var(--primary-dark);
        }

        button.danger-btn {
            background: var(--danger);
            color: white;
            border: none;
        }

        button.danger-btn:hover {
            background: var(--danger-dark);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 16px;
        }

        .day-header {
            text-align: center;
            font-weight: bold;
            font-size: 0.8rem;
            color: #78716c;
            padding: 4px 0;
        }

        .calendar-day {
            min-height: 80px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 4px;
            background: white;
            display: flex;
            flex-direction: column;
            gap: 3px;
            overflow: hidden;
        }

        .calendar-day.weekend {
            background-color: var(--weekend-bg);
        }

        .calendar-day.other-month {
            opacity: 0.3;
        }

        .day-number {
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* Tags Visite (Orange) */
        .visit-tag {
            background: var(--primary-light);
            color: #92400e;
            font-size: 0.75rem;
            padding: 3px 5px;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-left: 3px solid var(--primary);
            cursor: pointer;
            display: block;
        }

        /* Tags Absence (Rouge) */
        .absence-tag {
            background: var(--danger);
            color: white;
            font-size: 0.75rem;
            padding: 3px 5px;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-left: 3px solid var(--danger-dark);
            cursor: pointer;
            display: block;
            font-weight: 500;
        }

        .dots-container {
            display: none;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 2px;
            justify-content: center;
        }

        .visit-dot-bullet {
            width: 10px;
            height: 10px;
            background-color: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .absence-dot-bullet {
            width: 10px;
            height: 10px;
            background-color: var(--danger);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .timeline-item {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
            justify-content: space-between;
        }

        .timeline-date {
            width: 120px;
            font-weight: bold;
            color: #78716c;
            font-size: 0.9rem;
        }

        .timeline-content {
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .timeline-badge {
            background: var(--primary-light);
            color: #92400e;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            cursor: pointer;
            border-left: 3px solid var(--primary);
        }

        .timeline-badge.absence {
            background: var(--danger-light);
            color: var(--danger-dark);
            border-left: 3px solid var(--danger);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-header h3 {
            margin: 0;
            color: var(--primary);
            font-size: 1.2rem;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #78716c;
            padding: 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        input[type="text"], input[type="date"], input[type="number"], select {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .meals-section {
            background-color: var(--bg-color);
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
        }

        .meals-title {
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--primary-dark);
        }

        .meal-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .meal-row:last-child {
            margin-bottom: 0;
        }

        .meal-checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            user-select: none;
        }

        .meal-select {
            padding: 4px 6px;
            font-size: 0.8rem;
        }

        .recap-item {
            margin-bottom: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .recap-label {
            font-weight: bold;
            color: #78716c;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .recap-value {
            color: var(--text-color);
            font-weight: 500;
        }

        .recap-badge-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 4px;
        }

        .recap-badge-item {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            display: inline-block;
        }

        .modal-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .modal-actions-right {
            display: flex;
            gap: 8px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            body { padding: 6px; }
            .container { padding: 12px; border-radius: 12px; }
            h1 { font-size: 1.3rem; }
            .top-bar { flex-direction: column; align-items: stretch; }
            .view-toggle { justify-content: center; }
            .top-bar .primary-btn { width: 100%; text-align: center; }
            .calendar-day { min-height: 52px; padding: 3px; }
            .day-number { font-size: 0.75rem; text-align: center; }
            
            .visit-tag, .absence-tag { display: none; }
            .dots-container { display: flex; }
            
            .timeline-item { flex-direction: column; align-items: flex-start; gap: 6px; }
            .timeline-date { width: auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Visites chez Papyves & Maguite 🏡</h1>
            <p class="subtitle">Le calendrier de la famille, simple et chaleureux</p>
        </header>

        <div class="top-bar">
            <div class="view-toggle">
                <button id="btn-view-grid" class="toggle-btn active">📅 Grille Mois</button>
                <button id="btn-view-list" class="toggle-btn">📋 Vue Déroulante</button>
            </div>
            <button id="btn-open-add-modal" class="primary-btn">➕ Ajouter un événement</button>
        </div>

        <div class="calendar-nav">
            <button id="btn-prev-month">‹ Précédent</button>
            <div style="text-align: center;">
                <h2 id="current-month-label" style="margin: 0; font-size: 1rem;"></h2>
                <button id="btn-go-today" style="font-size: 0.7rem; margin-top: 2px; padding: 2px 6px;">Aujourd'hui</button>
            </div>
            <button id="btn-next-month">Suivant ›</button>
        </div>

        <div id="grid-view-container">
            <div class="calendar-grid">
                <div class="day-header">Lun</div>
                <div class="day-header">Mar</div>
                <div class="day-header">Mer</div>
                <div class="day-header">Jeu</div>
                <div class="day-header">Ven</div>
                <div class="day-header" style="color:var(--primary);">Sam</div>
                <div class="day-header" style="color:var(--primary);">Dim</div>
            </div>
            <div class="calendar-grid" id="calendar-days"></div>
        </div>

        <div id="list-view-container" class="timeline-view hidden">
            <div id="timeline-container"></div>
        </div>
    </div>

    <!-- Modale -->
    <div id="visit-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modal-title">➕ Ajouter un événement</h3>
                <button id="btn-close-modal" class="close-modal">✕</button>
            </div>
            
            <input type="hidden" id="visit-id">

            <!-- VUE RÉCAPITULATIF (détails uniquement) -->
            <div id="modal-recap-content" class="hidden">
                <div class="recap-item">
                    <div class="recap-label" id="recap-type-label">Événement</div>
                    <div id="recap-name" class="recap-value" style="font-size: 1.1rem; font-weight: bold;"></div>
                </div>

                <div class="recap-item">
                    <div class="recap-label">Période</div>
                    <div id="recap-dates" class="recap-value"></div>
                </div>

                <div id="recap-meals-group" class="recap-item">
                    <div class="recap-label">Repas prévus</div>
                    <div id="recap-meals" class="recap-badge-list"></div>
                </div>

                <div id="recap-comment-group" class="recap-item">
                    <div class="recap-label">Commentaire</div>
                    <div id="recap-comment" class="recap-value" style="font-style: italic;"></div>
                </div>
            </div>

            <!-- VUE FORMULAIRE (Édition/Ajout) -->
            <div id="modal-form-content">
                
                <div class="form-group">
                    <label for="event-type">Type d'événement</label>
                    <select id="event-type">
                        <option value="visit">👋 Visite d'un proche</option>
                        <option value="absence">🚫 Absence de Papyves & Maguite</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="visitor-name" id="label-visitor-name">Nom / Prénom</label>
                    <input type="text" id="visitor-name" placeholder="Ex: Thomas & Julie">
                </div>
                
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 2;">
                        <label for="visit-start">Date de début</label>
                        <input type="date" id="visit-start">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="visit-days">Jours</label>
                        <input type="number" id="visit-days" value="1" min="1">
                    </div>
                </div>

                <!-- SECTION REPAS (Masquée si Absence) -->
                <div class="meals-section" id="meals-section-container">
                    <div class="meals-title">🍽️ Nous serons là pour :</div>
                    
                    <div class="meal-row">
                        <label class="meal-checkbox-label">
                            <input type="checkbox" id="chk-breakfast"> 🥐 Petit-déjeuner
                        </label>
                        <select id="sel-breakfast" class="meal-select" disabled></select>
                    </div>

                    <div class="meal-row">
                        <label class="meal-checkbox-label">
                            <input type="checkbox" id="chk-lunch"> 🥗 Déjeuner
                        </label>
                        <select id="sel-lunch" class="meal-select" disabled></select>
                    </div>

                    <div class="meal-row">
                        <label class="meal-checkbox-label">
                            <input type="checkbox" id="chk-dinner"> 🍲 Dîner
                        </label>
                        <select id="sel-dinner" class="meal-select" disabled></select>
                    </div>
                </div>

                <!-- COMMENTAIRE (Masqué si Absence) -->
                <div class="form-group" id="comment-section-container">
                    <label for="visit-comment">Commentaire (facultatif)</label>
                    <input type="text" id="visit-comment" placeholder="Ex: On arrive pour le goûter !">
                </div>
            </div>

            <div class="modal-actions">
                <div>
                    <button id="btn-delete-visit" class="danger-btn hidden">🗑️ Supprimer</button>
                </div>
                <div class="modal-actions-right">
                    <button id="btn-cancel-modal">Annuler</button>
                    <button id="btn-edit-mode" class="primary-btn hidden">✏️ Modifier</button>
                    <button id="btn-save-visit" class="primary-btn">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDk4ZaEveUEdbpI1zOM64MShbtLmsL_3eU",
            authDomain: "famille-papyves.firebaseapp.com",
            projectId: "famille-papyves",
            storageBucket: "famille-papyves.firebasestorage.app",
            messagingSenderId: "159741543345",
            appId: "1:159741543345:web:4f5dcf0deb6c11ef47b390"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentDate = new Date();
        let currentView = 'grid';
        let visits = [];

        const monthNames = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];

        function initMealSelects() {
            ['sel-breakfast', 'sel-lunch', 'sel-dinner'].forEach(id => {
                const select = document.getElementById(id);
                select.innerHTML = '';
                for (let i = 1; i <= 10; i++) {
                    const opt = document.createElement('option');
                    opt.value = i;
                    opt.innerText = `${i} pers.`;
                    select.appendChild(opt);
                }
            });
        }
        initMealSelects();

        function bindMealCheckbox(chkId, selId) {
            const chk = document.getElementById(chkId);
            const sel = document.getElementById(selId);
            chk.addEventListener('change', () => {
                sel.disabled = !chk.checked;
            });
        }
        bindMealCheckbox('chk-breakfast', 'sel-breakfast');
        bindMealCheckbox('chk-lunch', 'sel-lunch');
        bindMealCheckbox('chk-dinner', 'sel-dinner');

        // Gestion du basculement Visite / Absence dans le formulaire
        const eventTypeSelect = document.getElementById("event-type");
        eventTypeSelect.addEventListener("change", () => {
            toggleFormFields(eventTypeSelect.value);
        });

        function toggleFormFields(type) {
            const labelName = document.getElementById("label-visitor-name");
            const inputName = document.getElementById("visitor-name");
            const mealsContainer = document.getElementById("meals-section-container");
            const commentContainer = document.getElementById("comment-section-container");

            if (type === "absence") {
                labelName.innerText = "Titre / Motif de l'absence";
                inputName.placeholder = "Ex: Vacances à la mer";
                mealsContainer.classList.add("hidden");
                commentContainer.classList.add("hidden");
            } else {
                labelName.innerText = "Nom / Prénom";
                inputName.placeholder = "Ex: Thomas & Julie";
                mealsContainer.classList.remove("hidden");
                commentContainer.classList.remove("hidden");
            }
        }

        onSnapshot(collection(db, "visits"), (snapshot) => {
            visits = [];
            snapshot.forEach((docSnapshot) => {
                visits.push({ id: docSnapshot.id, ...docSnapshot.data() });
            });
            renderCalendar();
        });

        function parseLocalDate(dateStr) {
            const [year, month, day] = dateStr.split('-').map(Number);
            return new Date(year, month - 1, day);
        }

        function checkPasscode() {
            const code = prompt("Entrez le code secret :");
            if (!code || code.trim().toUpperCase() !== "DENIS") {
                alert("Code incorrect. Action annulée.");
                return false;
            }
            return true;
        }

        function openModalForAdd() {
            document.getElementById("modal-title").innerText = "➕ Ajouter un événement";
            document.getElementById("visit-id").value = "";
            document.getElementById("event-type").value = "visit";
            toggleFormFields("visit");

            document.getElementById("visitor-name").value = "";
            document.getElementById("visit-start").value = "";
            document.getElementById("visit-days").value = "1";
            document.getElementById("visit-comment").value = "";

            ['breakfast', 'lunch', 'dinner'].forEach(m => {
                document.getElementById(`chk-${m}`).checked = false;
                document.getElementById(`sel-${m}`).disabled = true;
                document.getElementById(`sel-${m}`).value = "1";
            });

            document.getElementById("modal-recap-content").classList.add("hidden");
            document.getElementById("modal-form-content").classList.remove("hidden");

            document.getElementById("btn-delete-visit").classList.add("hidden");
            document.getElementById("btn-edit-mode").classList.add("hidden");
            document.getElementById("btn-save-visit").classList.remove("hidden");

            document.getElementById("visit-modal").classList.add("active");
        }

        function openModalForView(id) {
            const visit = visits.find(v => v.id === id);
            if (!visit) return;

            const isAbsence = visit.type === "absence";

            document.getElementById("modal-title").innerText = isAbsence ? "🚫 Détails de l'absence" : "📋 Détails de la visite";
            document.getElementById("visit-id").value = visit.id;

            document.getElementById("recap-type-label").innerText = isAbsence ? "Absence" : "Visiteur(s)";
            
            const recapName = document.getElementById("recap-name");
            recapName.innerText = visit.name;
            recapName.style.color = isAbsence ? "var(--danger)" : "var(--primary-dark)";

            const startDate = parseLocalDate(visit.start);
            const endDate = new Date(startDate);
            endDate.setDate(startDate.getDate() + (visit.days - 1));

            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            if (visit.days === 1) {
                document.getElementById("recap-dates").innerText = `Le ${startDate.toLocaleDateString('fr-FR', options)}`;
            } else {
                document.getElementById("recap-dates").innerText = `Du ${startDate.toLocaleDateString('fr-FR', options)} au ${endDate.toLocaleDateString('fr-FR', options)} (${visit.days} jours)`;
            }

            const mealsGroup = document.getElementById("recap-meals-group");
            const commentGroup = document.getElementById("recap-comment-group");

            if (isAbsence) {
                mealsGroup.classList.add("hidden");
                commentGroup.classList.add("hidden");
            } else {
                mealsGroup.classList.remove("hidden");
                commentGroup.classList.remove("hidden");

                const mealsList = document.getElementById("recap-meals");
                mealsList.innerHTML = "";
                let hasMeals = false;

                if (visit.meals) {
                    if (visit.meals.breakfast?.active) {
                        mealsList.innerHTML += `<div class="recap-badge-item">🥐 Petit-déjeuner (${visit.meals.breakfast.count} pers.)</div>`;
                        hasMeals = true;
                    }
                    if (visit.meals.lunch?.active) {
                        mealsList.innerHTML += `<div class="recap-badge-item">🥗 Déjeuner (${visit.meals.lunch.count} pers.)</div>`;
                        hasMeals = true;
                    }
                    if (visit.meals.dinner?.active) {
                        mealsList.innerHTML += `<div class="recap-badge-item">🍲 Dîner (${visit.meals.dinner.count} pers.)</div>`;
                        hasMeals = true;
                    }
                }
                if (!hasMeals) {
                    mealsList.innerHTML = `<span style="color:#78716c; font-style:italic;">Aucun repas spécifié</span>`;
                }

                document.getElementById("recap-comment").innerText = visit.comment ? `« ${visit.comment} »` : "Aucun commentaire.";
            }

            document.getElementById("modal-recap-content").classList.remove("hidden");
            document.getElementById("modal-form-content").classList.add("hidden");

            document.getElementById("btn-delete-visit").classList.add("hidden");
            document.getElementById("btn-save-visit").classList.add("hidden");
            document.getElementById("btn-edit-mode").classList.remove("hidden");

            document.getElementById("visit-modal").classList.add("active");
        }

        function switchToEditMode() {
            if (!checkPasscode()) return;

            const id = document.getElementById("visit-id").value;
            const visit = visits.find(v => v.id === id);
            if (!visit) return;

            const type = visit.type || "visit";
            document.getElementById("modal-title").innerText = type === "absence" ? "✏️ Modifier l'absence" : "✏️ Modifier la visite";
            document.getElementById("event-type").value = type;
            toggleFormFields(type);

            document.getElementById("visitor-name").value = visit.name;
            document.getElementById("visit-start").value = visit.start;
            document.getElementById("visit-days").value = visit.days;
            document.getElementById("visit-comment").value = visit.comment || "";

            ['breakfast', 'lunch', 'dinner'].forEach(m => {
                const mealData = visit.meals ? visit.meals[m] : null;
                const chk = document.getElementById(`chk-${m}`);
                const sel = document.getElementById(`sel-${m}`);
                if (mealData && mealData.active) {
                    chk.checked = true;
                    sel.disabled = false;
                    sel.value = mealData.count || 1;
                } else {
                    chk.checked = false;
                    sel.disabled = true;
                    sel.value = 1;
                }
            });

            document.getElementById("modal-recap-content").classList.add("hidden");
            document.getElementById("modal-form-content").classList.remove("hidden");

            document.getElementById("btn-delete-visit").classList.remove("hidden");
            document.getElementById("btn-edit-mode").classList.add("hidden");
            document.getElementById("btn-save-visit").classList.remove("hidden");
        }

        function closeModal() {
            document.getElementById("visit-modal").classList.remove("active");
        }

        function setView(view) {
            currentView = view;
            const gridContainer = document.getElementById("grid-view-container");
            const listContainer = document.getElementById("list-view-container");
            const btnGrid = document.getElementById("btn-view-grid");
            const btnList = document.getElementById("btn-view-list");

            if (view === 'grid') {
                gridContainer.classList.remove("hidden");
                listContainer.classList.add("hidden");
                btnGrid.classList.add("active");
                btnList.classList.remove("active");
            } else {
                gridContainer.classList.add("hidden");
                listContainer.classList.remove("hidden");
                btnGrid.classList.remove("active");
                btnList.classList.add("active");
            }
        }

        function formatMealSummary(meals) {
            if (!meals) return '';
            const parts = [];
            if (meals.breakfast?.active) parts.push(`🥐 Petit-déj (${meals.breakfast.count}p)`);
            if (meals.lunch?.active) parts.push(`🥗 Déjeuner (${meals.lunch.count}p)`);
            if (meals.dinner?.active) parts.push(`🍲 Dîner (${meals.dinner.count}p)`);
            return parts.length > 0 ? ' - ' + parts.join(', ') : '';
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            document.getElementById("current-month-label").innerText = `${monthNames[month]} ${year}`;

            const daysContainer = document.getElementById("calendar-days");
            daysContainer.innerHTML = "";

            const firstDayIndex = (new Date(year, month, 1).getDay() + 6) % 7; 
            const totalDays = new Date(year, month + 1, 0).getDate();
            const prevTotalDays = new Date(year, month, 0).getDate();

            for (let i = firstDayIndex; i > 0; i--) {
                const dayDiv = document.createElement("div");
                dayDiv.className = "calendar-day other-month";
                dayDiv.innerHTML = `<div class="day-number">${prevTotalDays - i + 1}</div>`;
                daysContainer.appendChild(dayDiv);
            }

            let timelineHtml = "";
            for (let day = 1; day <= totalDays; day++) {
                const dayDiv = document.createElement("div");
                const currentDay = new Date(year, month, day);
                const isWeekend = currentDay.getDay() === 0 || currentDay.getDay() === 6;

                dayDiv.className = `calendar-day ${isWeekend ? 'weekend' : ''}`;
                dayDiv.innerHTML = `<div class="day-number">${day}</div>`;

                const dotsContainer = document.createElement("div");
                dotsContainer.className = "dots-container";

                let dayVisits = [];
                visits.forEach(v => {
                    let startDate = parseLocalDate(v.start);
                    let endDate = new Date(startDate);
                    endDate.setDate(startDate.getDate() + v.days - 1);

                    if (currentDay >= startDate && currentDay <= endDate) {
                        dayVisits.push(v);
                        const isAbsence = v.type === "absence";

                        const tag = document.createElement("div");
                        tag.className = isAbsence ? "absence-tag" : "visit-tag";
                        tag.title = isAbsence ? `ABSENCE: ${v.name}` : `${v.name}${formatMealSummary(v.meals)}${v.comment ? ' - ' + v.comment : ''}`;
                        tag.innerText = isAbsence ? `🚫 ${v.name}` : v.name;
                        tag.onclick = (e) => { e.stopPropagation(); openModalForView(v.id); };
                        dayDiv.appendChild(tag);

                        const dot = document.createElement("div");
                        dot.className = isAbsence ? "absence-dot-bullet" : "visit-dot-bullet";
                        dot.title = `${v.name} (Cliquer pour détails)`;
                        dot.onclick = (e) => { e.stopPropagation(); openModalForView(v.id); };
                        dotsContainer.appendChild(dot);
                    }
                });

                dayDiv.appendChild(dotsContainer);
                daysContainer.appendChild(dayDiv);

                if (dayVisits.length > 0) {
                    timelineHtml += `
                        <div class="timeline-item">
                            <div class="timeline-date">${day} ${monthNames[month]}</div>
                            <div class="timeline-content">
                                ${dayVisits.map(v => {
                                    const isAbsence = v.type === "absence";
                                    return `
                                        <span class="timeline-badge ${isAbsence ? 'absence' : ''}" data-id="${v.id}">
                                            <strong>${isAbsence ? '🚫 ABSENCE: ' + v.name : v.name}</strong> 
                                            ${!isAbsence ? formatMealSummary(v.meals) : ''} 
                                            ${v.comment && !isAbsence ? '(' + v.comment + ')' : ''}
                                        </span>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                }
            }

            document.getElementById("timeline-container").innerHTML = timelineHtml || "<p style='color:#78716c; font-style:italic;'>Aucun événement enregistré pour ce mois-ci.</p>";
            
            document.querySelectorAll('.timeline-badge').forEach(badge => {
                badge.addEventListener('click', () => openModalForView(badge.dataset.id));
            });
        }

        async function saveOrDeleteVisit(isDelete = false) {
            const id = document.getElementById("visit-id").value;

            if (isDelete) {
                if (confirm("Voulez-vous vraiment supprimer cet événement ?")) {
                    await deleteDoc(doc(db, "visits", id));
                    closeModal();
                }
                return;
            }

            const type = document.getElementById("event-type").value;
            const name = document.getElementById("visitor-name").value.trim();
            const start = document.getElementById("visit-start").value;
            const days = parseInt(document.getElementById("visit-days").value);

            if (!name || !start) {
                alert("Veuillez remplir le titre/nom et la date de début.");
                return;
            }

            if (!id) {
                if (!checkPasscode()) return;
            }

            let visitData = { type, name, start, days };

            if (type === "visit") {
                const comment = document.getElementById("visit-comment").value.trim();
                const meals = {
                    breakfast: {
                        active: document.getElementById("chk-breakfast").checked,
                        count: parseInt(document.getElementById("sel-breakfast").value)
                    },
                    lunch: {
                        active: document.getElementById("chk-lunch").checked,
                        count: parseInt(document.getElementById("sel-lunch").value)
                    },
                    dinner: {
                        active: document.getElementById("chk-dinner").checked,
                        count: parseInt(document.getElementById("sel-dinner").value)
                    }
                };
                visitData.comment = comment;
                visitData.meals = meals;
            }

            if (id) {
                await updateDoc(doc(db, "visits", id), visitData);
            } else {
                await addDoc(collection(db, "visits"), visitData);
            }

            closeModal();
        }

        document.getElementById("btn-view-grid").onclick = () => setView('grid');
        document.getElementById("btn-view-list").onclick = () => setView('list');
        document.getElementById("btn-open-add-modal").onclick = openModalForAdd;
        document.getElementById("btn-close-modal").onclick = closeModal;
        document.getElementById("btn-cancel-modal").onclick = closeModal;
        document.getElementById("btn-edit-mode").onclick = switchToEditMode;
        document.getElementById("btn-save-visit").onclick = () => saveOrDeleteVisit(false);
        document.getElementById("btn-delete-visit").onclick = () => saveOrDeleteVisit(true);

        document.getElementById("btn-prev-month").onclick = () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        };

        document.getElementById("btn-next-month").onclick = () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        };

        document.getElementById("btn-go-today").onclick = () => {
            currentDate = new Date();
            renderCalendar();
        };

        renderCalendar();
    </script>
</body>
</html>
