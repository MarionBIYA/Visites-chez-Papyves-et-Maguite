<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visites chez Papyves & Maguite</title>
    <style>
        :root {
            --primary: #d97706;
            --primary-dark: #b45309;
            --primary-light: #fef3c7;
            --bg-color: #fcfbf9;
            --text-color: #292524;
            --weekend-bg: #f5f5f4;
            --border-color: #e7e5e4;
            --danger: #ef4444;
            --danger-dark: #dc2626;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary);
            margin: 0 0 6px 0;
            font-size: 1.6rem;
        }

        p.subtitle {
            margin: 0;
            color: #78716c;
            font-size: 0.95rem;
        }

        /* Barre supérieure : Onglets de vue + Bouton d'ajout */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .view-toggle {
            display: flex;
            gap: 8px;
        }

        .toggle-btn {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            color: #78716c;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            background: var(--bg-color);
            padding: 10px 14px;
            border-radius: 12px;
        }

        button {
            background: white;
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-color);
            transition: background 0.2s;
            font-size: 0.85rem;
        }

        button:hover {
            background: var(--border-color);
        }

        button.primary-btn {
            background: var(--primary);
            color: white;
            border: none;
        }

        button.primary-btn:hover {
            background: var(--primary-dark);
        }

        button.danger-btn {
            background: var(--danger);
            color: white;
            border: none;
        }

        button.danger-btn:hover {
            background: var(--danger-dark);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 16px;
        }

        .day-header {
            text-align: center;
            font-weight: bold;
            font-size: 0.8rem;
            color: #78716c;
            padding: 4px 0;
        }

        .calendar-day {
            min-height: 80px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 4px;
            background: white;
            display: flex;
            flex-direction: column;
            gap: 3px;
            overflow: hidden;
        }

        .calendar-day.weekend {
            background-color: var(--weekend-bg);
        }

        .calendar-day.other-month {
            opacity: 0.3;
        }

        .day-number {
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* Modèle de tag pour grande écran */
        .visit-tag {
            background: var(--primary-light);
            color: #92400e;
            font-size: 0.75rem;
            padding: 3px 5px;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-left: 3px solid var(--primary);
            cursor: pointer;
            transition: transform 0.1s ease, filter 0.1s ease;
            display: block;
        }

        .visit-tag:hover {
            transform: translateY(-1px);
            filter: brightness(0.95);
        }

        /* Puce miniature pour mobile/tablette */
        .visit-dot {
            display: none;
            background: var(--primary);
            color: white;
            font-size: 0.65rem;
            padding: 2px 4px;
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: bold;
        }

        .timeline-item {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
            justify-content: space-between;
        }

        .timeline-date {
            width: 120px;
            font-weight: bold;
            color: #78716c;
            font-size: 0.9rem;
        }

        .timeline-content {
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .timeline-badge {
            background: var(--primary-light);
            color: #92400e;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            cursor: pointer;
            border-left: 3px solid var(--primary);
        }

        /* Style de la boîte modale */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-header h3 {
            margin: 0;
            color: var(--primary);
            font-size: 1.2rem;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #78716c;
            padding: 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        input {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .modal-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .modal-actions-right {
            display: flex;
            gap: 8px;
        }

        .hidden {
            display: none !important;
        }

        /* OPTIMISATIONS MOBILE ET TABLETTE */
        @media (max-width: 768px) {
            body {
                padding: 6px;
            }

            .container {
                padding: 12px;
                border-radius: 12px;
            }

            h1 {
                font-size: 1.3rem;
            }

            .top-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .view-toggle {
                justify-content: center;
            }

            .top-bar .primary-btn {
                width: 100%;
                text-align: center;
            }

            .calendar-day {
                min-height: 52px;
                padding: 3px;
            }

            .day-number {
                font-size: 0.75rem;
            }

            /* Sur mobile / tablette : on masque le grand tag et on affiche l'indicateur compact */
            .visit-tag {
                display: none;
            }

            .visit-dot {
                display: block;
            }

            .timeline-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }

            .timeline-date {
                width: auto;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Visites chez Papyves & Maguite 🏡</h1>
            <p class="subtitle">Le calendrier de la famille, simple et chaleureux</p>
        </header>

        <!-- Barre supérieure alignée -->
        <div class="top-bar">
            <div class="view-toggle">
                <button id="btn-view-grid" class="toggle-btn active" onclick="setView('grid')">📅 Grille Mois</button>
                <button id="btn-view-list" class="toggle-btn" onclick="setView('list')">📋 Vue Déroulante</button>
            </div>
            <button class="primary-btn" onclick="openModalForAdd()">➕ Ajouter une visite</button>
        </div>

        <div class="calendar-nav">
            <button onclick="changeMonth(-1)">‹ Précédent</button>
            
            <div style="text-align: center;">
                <h2 id="current-month-label" style="margin: 0; font-size: 1rem;"></h2>
                <button onclick="goToToday()" style="font-size: 0.7rem; margin-top: 2px; padding: 2px 6px;">Aujourd'hui</button>
            </div>

            <button onclick="changeMonth(1)">Suivant ›</button>
        </div>

        <div id="grid-view-container">
            <div class="calendar-grid">
                <div class="day-header">Lun</div>
                <div class="day-header">Mar</div>
                <div class="day-header">Mer</div>
                <div class="day-header">Jeu</div>
                <div class="day-header">Ven</div>
                <div class="day-header" style="color:var(--primary);">Sam</div>
                <div class="day-header" style="color:var(--primary);">Dim</div>
            </div>
            <div class="calendar-grid" id="calendar-days"></div>
        </div>

        <div id="list-view-container" class="timeline-view hidden">
            <div id="timeline-container"></div>
        </div>
    </div>

    <!-- Boîte Modale -->
    <div id="visit-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modal-title">➕ Ajouter une visite</h3>
                <button class="close-modal" onclick="closeModal()">✕</button>
            </div>
            
            <input type="hidden" id="visit-id">

            <div class="form-group">
                <label for="visitor-name">Nom / Prénom</label>
                <input type="text" id="visitor-name" placeholder="Ex: Thomas & Julie">
            </div>
            
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 2;">
                    <label for="visit-start">Date de début</label>
                    <input type="date" id="visit-start">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="visit-days">Jours</label>
                    <input type="number" id="visit-days" value="1" min="1">
                </div>
            </div>

            <div class="form-group">
                <label for="visit-comment">Commentaire (facultatif)</label>
                <input type="text" id="visit-comment" placeholder="Ex: On arrive pour le goûter !">
            </div>

            <div class="modal-actions">
                <div>
                    <button id="btn-delete-visit" class="danger-btn hidden" onclick="saveOrDeleteVisit(true)">🗑️ Supprimer</button>
                </div>
                <div class="modal-actions-right">
                    <button onclick="closeModal()">Annuler</button>
                    <button class="primary-btn" onclick="saveOrDeleteVisit(false)">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let currentView = 'grid';

        let visits = JSON.parse(localStorage.getItem('family_visits')) || [];

        const monthNames = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];

        function parseLocalDate(dateStr) {
            const [year, month, day] = dateStr.split('-').map(Number);
            return new Date(year, month - 1, day);
        }

        function checkPasscode() {
            const code = prompt("Entrez le code secret :");
            if (!code || code.trim().toUpperCase() !== "DENIS") {
                alert("Code incorrect. Action annulée.");
                return false;
            }
            return true;
        }

        function openModalForAdd() {
            document.getElementById("modal-title").innerText = "➕ Ajouter une visite";
            document.getElementById("visit-id").value = "";
            document.getElementById("visitor-name").value = "";
            document.getElementById("visit-start").value = "";
            document.getElementById("visit-days").value = "1";
            document.getElementById("visit-comment").value = "";
            document.getElementById("btn-delete-visit").classList.add("hidden");

            document.getElementById("visit-modal").classList.add("active");
        }

        function openModalForEdit(id) {
            const visit = visits.find(v => v.id === id);
            if (!visit) return;

            document.getElementById("modal-title").innerText = "✏️ Modifier la visite";
            document.getElementById("visit-id").value = visit.id;
            document.getElementById("visitor-name").value = visit.name;
            document.getElementById("visit-start").value = visit.start;
            document.getElementById("visit-days").value = visit.days;
            document.getElementById("visit-comment").value = visit.comment || "";
            document.getElementById("btn-delete-visit").classList.remove("hidden");

            document.getElementById("visit-modal").classList.add("active");
        }

        function closeModal() {
            document.getElementById("visit-modal").classList.remove("active");
        }

        function setView(view) {
            currentView = view;
            const gridContainer = document.getElementById("grid-view-container");
            const listContainer = document.getElementById("list-view-container");
            const btnGrid = document.getElementById("btn-view-grid");
            const btnList = document.getElementById("btn-view-list");

            if (view === 'grid') {
                gridContainer.classList.remove("hidden");
                listContainer.classList.add("hidden");
                btnGrid.classList.add("active");
                btnList.classList.remove("active");
            } else {
                gridContainer.classList.add("hidden");
                listContainer.classList.remove("hidden");
                btnGrid.classList.remove("active");
                btnList.classList.add("active");
            }
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            renderCalendar();
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            document.getElementById("current-month-label").innerText = `${monthNames[month]} ${year}`;

            const daysContainer = document.getElementById("calendar-days");
            daysContainer.innerHTML = "";

            const firstDayIndex = (new Date(year, month, 1).getDay() + 6) % 7; 
            const totalDays = new Date(year, month + 1, 0).getDate();
            const prevTotalDays = new Date(year, month, 0).getDate();

            for (let i = firstDayIndex; i > 0; i--) {
                const dayDiv = document.createElement("div");
                dayDiv.className = "calendar-day other-month";
                dayDiv.innerHTML = `<div class="day-number">${prevTotalDays - i + 1}</div>`;
                daysContainer.appendChild(dayDiv);
            }

            let timelineHtml = "";
            for (let day = 1; day <= totalDays; day++) {
                const dayDiv = document.createElement("div");
                const currentDay = new Date(year, month, day);
                const isWeekend = currentDay.getDay() === 0 || currentDay.getDay() === 6;

                dayDiv.className = `calendar-day ${isWeekend ? 'weekend' : ''}`;
                dayDiv.innerHTML = `<div class="day-number">${day}</div>`;

                let dayVisits = [];
                visits.forEach(v => {
                    let startDate = parseLocalDate(v.start);
                    let endDate = new Date(startDate);
                    endDate.setDate(startDate.getDate() + v.days - 1);

                    if (currentDay >= startDate && currentDay <= endDate) {
                        dayVisits.push(v);

                        // Tag grand écran (nom complet)
                        const tag = document.createElement("div");
                        tag.className = "visit-tag";
                        tag.title = `${v.name}${v.comment ? ' - ' + v.comment : ''} (Cliquer pour modifier)`;
                        tag.innerText = v.name;
                        tag.onclick = (e) => {
                            e.stopPropagation();
                            openModalForEdit(v.id);
                        };
                        dayDiv.appendChild(tag);

                        // Puce miniature mobile/tablette (icône + court)
                        const dot = document.createElement("div");
                        dot.className = "visit-dot";
                        dot.title = `${v.name} (Cliquer pour voir/modifier)`;
                        dot.innerText = `👤 ${v.name}`;
                        dot.onclick = (e) => {
                            e.stopPropagation();
                            openModalForEdit(v.id);
                        };
                        dayDiv.appendChild(dot);
                    }
                });

                daysContainer.appendChild(dayDiv);

                if (dayVisits.length > 0) {
                    timelineHtml += `
                        <div class="timeline-item">
                            <div class="timeline-date">${day} ${monthNames[month]}</div>
                            <div class="timeline-content">
                                ${dayVisits.map(v => `
                                    <span class="timeline-badge" onclick="openModalForEdit(${v.id})" title="Cliquer pour modifier">
                                        <strong>${v.name}</strong> ${v.comment ? '(' + v.comment + ')' : ''}
                                    </span>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
            }

            document.getElementById("timeline-container").innerHTML = timelineHtml || "<p style='color:#78716c; font-style:italic;'>Aucune visite enregistrée pour ce mois-ci.</p>";
        }

        function saveOrDeleteVisit(isDelete = false) {
            const id = document.getElementById("visit-id").value;

            if (isDelete) {
                if (confirm("Voulez-vous vraiment supprimer cette visite ?")) {
                    if (!checkPasscode()) return;
                    visits = visits.filter(v => v.id != id);
                    localStorage.setItem('family_visits', JSON.stringify(visits));
                    closeModal();
                    renderCalendar();
                }
                return;
            }

            const name = document.getElementById("visitor-name").value.trim();
            const start = document.getElementById("visit-start").value;
            const days = parseInt(document.getElementById("visit-days").value);
            const comment = document.getElementById("visit-comment").value.trim();

            if (!name || !start) {
                alert("Veuillez remplir au moins le nom et la date de début.");
                return;
            }

            if (!checkPasscode()) return;

            if (id) {
                const index = visits.findIndex(v => v.id == id);
                if (index !== -1) {
                    visits[index] = { id: Number(id), name, start, days, comment };
                }
            } else {
                visits.push({
                    id: Date.now(),
                    name,
                    start,
                    days,
                    comment
                });
            }

            localStorage.setItem('family_visits', JSON.stringify(visits));
            closeModal();
            renderCalendar();
        }

        renderCalendar();
    </script>
</body>
</html>
