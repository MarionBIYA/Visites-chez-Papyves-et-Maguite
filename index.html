<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visites chez Papyves & Maguite</title>
    <style>
        :root {
            --primary: #d97706;
            --primary-light: #fef3c7;
            --bg-color: #fcfbf9;
            --text-color: #292524;
            --weekend-bg: #f5f5f4;
            --border-color: #e7e5e4;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        h1 {
            color: var(--primary);
            margin: 0 0 8px 0;
            font-size: 1.8rem;
        }

        p.subtitle {
            margin: 0;
            color: #78716c;
            font-size: 1rem;
        }

        /* Barre d'action supérieure (Modes de vue + Bouton Ajouter) */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .view-toggle {
            display: flex;
            gap: 8px;
        }

        .toggle-btn {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            color: #78716c;
            transition: all 0.2s ease;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Formulaire pliable (Accordéon) */
        .action-section {
            background: var(--bg-color);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .action-section h3 {
            margin-top: 0;
            margin-bottom: 16px;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        input {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 12px;
        }

        /* Navigation Mois */
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: var(--bg-color);
            padding: 12px 20px;
            border-radius: 12px;
        }

        button {
            background: white;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-color);
            transition: background 0.2s;
        }

        button:hover {
            background: var(--border-color);
        }

        button.primary-btn {
            background: var(--primary);
            color: white;
            border: none;
        }

        button.primary-btn:hover {
            background: #b45309;
        }

        /* Grille Calendrier */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .day-header {
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
            color: #78716c;
            padding: 8px 0;
        }

        .calendar-day {
            min-height: 90px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            position: relative;
        }

        .calendar-day.weekend {
            background-color: var(--weekend-bg);
        }

        .calendar-day.other-month {
            opacity: 0.3;
        }

        .day-number {
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .visit-tag {
            background: var(--primary-light);
            color: #92400e;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            border-left: 3px solid var(--primary);
        }

        /* Vue déroulante */
        .timeline-view {
            margin-top: 10px;
        }

        .timeline-item {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
        }

        .timeline-date {
            width: 140px;
            font-weight: bold;
            color: #78716c;
        }

        .timeline-content {
            flex-grow: 1;
        }

        /* Utilitaire */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Visites chez Papyves & Maguite 🏡</h1>
            <p class="subtitle">Le calendrier de la famille, simple et chaleureux</p>
        </header>

        <!-- Barre supérieure : choix de vue à gauche, bouton d'ajout à droite -->
        <div class="top-bar">
            <div class="view-toggle">
                <button id="btn-view-grid" class="toggle-btn active" onclick="setView('grid')">📅 Grille Mois</button>
                <button id="btn-view-list" class="toggle-btn" onclick="setView('list')">📋 Vue Déroulante</button>
            </div>
            <button class="primary-btn" onclick="toggleAddForm()">➕ Ajouter une visite</button>
        </div>

        <!-- Onglet / Formulaire dépliant (masqué par défaut) -->
        <div id="add-visit-form" class="action-section hidden">
            <h3>Nouveau séjour chez Papyves & Maguite</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="visitor-name">Nom / Prénom</label>
                    <input type="text" id="visitor-name" placeholder="Ex: Thomas & Julie">
                </div>
                <div class="form-group">
                    <label for="visit-start">Date de début</label>
                    <input type="date" id="visit-start">
                </div>
                <div class="form-group">
                    <label for="visit-days">Nombre de jours</label>
                    <input type="number" id="visit-days" value="1" min="1">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="visit-comment">Commentaire (facultatif)</label>
                    <input type="text" id="visit-comment" placeholder="Ex: On arrive pour le goûter !">
                </div>
            </div>
            <div class="form-actions">
                <button onclick="toggleAddForm()">Annuler</button>
                <button class="primary-btn" onclick="addVisit()">Enregistrer la visite</button>
            </div>
        </div>

        <!-- Navigation Mois -->
        <div class="calendar-nav">
            <button onclick="changeMonth(-1)">Mois précédent</button>
            <h2 id="current-month-label" style="margin: 0; font-size: 1.2rem;"></h2>
            <button onclick="changeMonth(1)">Mois suivant</button>
        </div>

        <!-- Vue Grille Calendrier -->
        <div id="grid-view-container">
            <div class="calendar-grid">
                <div class="day-header">Lun</div>
                <div class="day-header">Mar</div>
                <div class="day-header">Mer</div>
                <div class="day-header">Jeu</div>
                <div class="day-header">Ven</div>
                <div class="day-header" style="color:var(--primary);">Sam</div>
                <div class="day-header" style="color:var(--primary);">Dim</div>
            </div>
            <div class="calendar-grid" id="calendar-days"></div>
        </div>

        <!-- Vue Déroulante (Liste) -->
        <div id="list-view-container" class="timeline-view hidden">
            <div id="timeline-container"></div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let currentView = 'grid';
        
        ];
        let visits = JSON.parse(localStorage.getItem('family_visits')) || defaultVisits;

        const monthNames = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];

        function parseLocalDate(dateStr) {
            const [year, month, day] = dateStr.split('-').map(Number);
            return new Date(year, month - 1, day);
        }

        function toggleAddForm() {
            const form = document.getElementById("add-visit-form");
            form.classList.toggle("hidden");
        }

        function setView(view) {
            currentView = view;
            const gridContainer = document.getElementById("grid-view-container");
            const listContainer = document.getElementById("list-view-container");
            const btnGrid = document.getElementById("btn-view-grid");
            const btnList = document.getElementById("btn-view-list");

            if (view === 'grid') {
                gridContainer.classList.remove("hidden");
                listContainer.classList.add("hidden");
                btnGrid.classList.add("active");
                btnList.classList.remove("active");
            } else {
                gridContainer.classList.add("hidden");
                listContainer.classList.remove("hidden");
                btnGrid.classList.remove("active");
                btnList.classList.add("active");
            }
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            document.getElementById("current-month-label").innerText = `${monthNames[month]} ${year}`;

            const daysContainer = document.getElementById("calendar-days");
            daysContainer.innerHTML = "";

            const firstDayIndex = (new Date(year, month, 1).getDay() + 6) % 7; 
            const totalDays = new Date(year, month + 1, 0).getDate();
            const prevTotalDays = new Date(year, month, 0).getDate();

            // Jours du mois précédent
            for (let i = firstDayIndex; i > 0; i--) {
                const dayDiv = document.createElement("div");
                dayDiv.className = "calendar-day other-month";
                dayDiv.innerHTML = `<div class="day-number">${prevTotalDays - i + 1}</div>`;
                daysContainer.appendChild(dayDiv);
            }

            // Jours du mois en cours
            let timelineHtml = "";
            for (let day = 1; day <= totalDays; day++) {
                const dayDiv = document.createElement("div");
                const currentDay = new Date(year, month, day);
                const isWeekend = currentDay.getDay() === 0 || currentDay.getDay() === 6;

                dayDiv.className = `calendar-day ${isWeekend ? 'weekend' : ''}`;
                dayDiv.innerHTML = `<div class="day-number">${day}</div>`;

                let dayVisits = [];
                visits.forEach(v => {
                    let startDate = parseLocalDate(v.start);
                    let endDate = new Date(startDate);
                    endDate.setDate(startDate.getDate() + v.days - 1);

                    if (currentDay >= startDate && currentDay <= endDate) {
                        dayVisits.push(v);
                        const tag = document.createElement("div");
                        tag.className = "visit-tag";
                        tag.title = `${v.name}${v.comment ? ' - ' + v.comment : ''}`;
                        tag.innerText = v.name;
                        dayDiv.appendChild(tag);
                    }
                });

                daysContainer.appendChild(dayDiv);

                if (dayVisits.length > 0) {
                    timelineHtml += `
                        <div class="timeline-item">
                            <div class="timeline-date">${day} ${monthNames[month]}</div>
                            <div class="timeline-content">
                                ${dayVisits.map(v => `<strong>${v.name}</strong> ${v.comment ? '(' + v.comment + ')' : ''}`).join(', ')}
                            </div>
                        </div>
                    `;
                }
            }

            document.getElementById("timeline-container").innerHTML = timelineHtml || "<p style='color:#78716c; font-style:italic;'>Aucune visite enregistrée pour ce mois-ci.</p>";
        }

        function addVisit() {
            const name = document.getElementById("visitor-name").value.trim();
            const start = document.getElementById("visit-start").value;
            const days = parseInt(document.getElementById("visit-days").value);
            const comment = document.getElementById("visit-comment").value.trim();

            if (!name || !start) {
                alert("Veuillez remplir au moins le nom et la date de début.");
                return;
            }

            const code = prompt("Veuillez entrer le code secret de modification :");
            if (code !== "DENIS") {
                alert("Code incorrect. Modification annulée.");
                return;
            }

            visits.push({ name, start, days, comment });
            localStorage.setItem('family_visits', JSON.stringify(visits));

            // Réinitialisation des champs et fermeture du formulaire
            document.getElementById("visitor-name").value = "";
            document.getElementById("visit-start").value = "";
            document.getElementById("visit-days").value = "1";
            document.getElementById("visit-comment").value = "";
            toggleAddForm();

            renderCalendar();
            alert("Visite ajoutée avec succès !");
        }

        renderCalendar();
    </script>
</body>
</html>
